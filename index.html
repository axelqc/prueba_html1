<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Mantenimiento Remolques</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 20px;
  }
  .container { max-width: 1000px; margin: auto; }
  .header {
    background: #8FE3D9;
    padding: 14px 24px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .header svg {
    height: 48px;
    width: auto;
    flex-shrink: 0;
  }
  .header h1 {
    color: #ffffff;
    font-size: 20px;
    margin: 0;
    font-weight: 600;
    border-left: 2px solid #b4081a;
    padding-left: 20px;
  }
  .header h1 span { color: #b4081a; }
  .card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    border: 1px solid #e8e8e8;
  }
  .card h3 { color: #030405; margin-top: 0; margin-bottom: 12px; }
  button {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    background: #b4081a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  button:hover { background: #920613; }
  .status { padding: 10px 14px; border-radius: 6px; margin-top: 12px; font-weight: bold; }
  .ok      { background: #d4edda; color: #155724; }
  .error   { background: #f8d7da; color: #721c24; }
  .warning { background: #fff3cd; color: #856404; }
  #chatContainer h3 {
    color: #030405;
    margin-top: 0;
    margin-bottom: 14px;
    border-bottom: 2px solid #b4081a;
    padding-bottom: 10px;
  }
  #root { min-height: 650px; width: 100%; }
  #root iframe, #root > div {
    width: 100% !important;
    min-height: 650px !important;
    height: 650px !important;
  }
</style>
</head>

  <div class="card">
    <button onclick="checkService()">🚀 Levantar Servicio</button>
    <div id="status" class="status warning">🟡 Servicio no verificado</div>

    <h3>💬 Chat de Mantenimiento</h3>

<script>
async function checkService() {
  const statusDiv = document.getElementById("status");
  statusDiv.className = "status warning";
  statusDiv.innerHTML = "⏳ Verificando servicio...";
  try {
    const response = await fetch("https://mantenimientos-remolques.onrender.com/health");
    if (!response.ok) throw new Error("HTTP " + response.status);
    const data = await response.json();
    if (data.status.toLowerCase() === "ok") {
      statusDiv.className = "status ok";
      statusDiv.innerHTML = "🟢 Servicio activo";
      loadChat();
    } else {
      statusDiv.className = "status error";
      statusDiv.innerHTML = "⚠️ Servicio respondió pero no está OK";
    }
  } catch (err) {
    statusDiv.className = "status error";
    statusDiv.innerHTML = "❌ Error de conexión: " + err.message;
  }
}

function loadChat() {
  document.getElementById("chatContainer").style.display = "block";
  window.wxOConfiguration = {
    orchestrationID: "42379027d430475b88345e10c0b3a286_f9c6e89a-063b-4b08-a991-345a2cf42dfc",
    hostURL: "https://us-south.watson-orchestrate.cloud.ibm.com",
    rootElementID: "root",
    deploymentPlatform: "ibmcloud",
    crn: "crn:v1:bluemix:public:watsonx-orchestrate:us-south:a/42379027d430475b88345e10c0b3a286:f9c6e89a-063b-4b08-a991-345a2cf42dfc::",
    chatOptions: { agentId: "0f99cdaf-2e84-4b35-8c69-66791fe74dd8" }
  };
  const script = document.createElement("script");
  script.src = window.wxOConfiguration.hostURL + "/wxochat/wxoLoader.js?embed=true";
  script.onload = function () {
    if (typeof wxoLoader !== "undefined") wxoLoader.init();
  };
  document.head.appendChild(script);
}
</script>
